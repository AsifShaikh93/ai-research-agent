apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-research-agent
  namespace: ai-agent-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
      - name: agent
        image: asif1993/ai-research-agent:v6
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: all-secrets-here
              key: GROQ_API_KEY
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: all-secrets-here  
              key: HF_TOKEN 
        - name: TAVILY_API_KEY
          valueFrom:
            secretKeyRef:
              name: all-secrets-here  
              key: TAVILY_API_KEY 
        - name: LANGCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: all-secrets-here 
              key: LANGCHAIN_API_KEY               
        ports:
        - containerPort: 8000